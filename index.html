<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --accent: #ff2d55;
            --accent-glow: rgba(255, 45, 85, 0.6);
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-card: rgba(15, 10, 12, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-dark: #070608;
            --royal-red: #5c000c;
            --bulb-warm: #ffe682;
            --bulb-glow: rgba(255, 230, 130, 0.9);
        }

        /* --- Global Reset & Luxury Settings --- */
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            background: radial-gradient(circle at 50% 50%, #14080e 0%, #050306 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: #f5f5f7;
            perspective: 1200px;
        }

        /* --- Fluid Page Layout Systems --- */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            text-align: center;
            visibility: hidden;
            opacity: 0;
            transform: scale(1.08) translateZ(0);
            transition: all 1.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
            overflow-x: hidden;
        }

        .page.active {
            visibility: visible;
            opacity: 1;
            transform: scale(1) translateZ(0);
            z-index: 10;
        }

        /* --- Dynamic Background Particle Animations --- */
        @keyframes floatHeart {
            0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-115vh) scale(1.4) rotate(280deg); opacity: 0; }
        }

        @keyframes premiumPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 45, 85, 0.3), inset 0 0 10px rgba(255, 45, 85, 0.2); border-color: var(--accent); }
            50% { box-shadow: 0 0 35px var(--accent-glow), inset 0 0 15px rgba(255, 45, 85, 0.4); border-color: #ff6b8b; }
        }

        /* --- Hero Dashboard Page --- */
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.4rem, 8vw, 5.5rem);
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff 10%, #ff2d55 50%, #ffd4e0 90%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 5s linear infinite;
            margin-bottom: 1rem;
            line-height: 1.15;
            letter-spacing: -1px;
            display: block;
            width: 100%;
            max-width: 1200px;
        }

        @keyframes textShine { 
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

            font-size: clamp(0.9rem, 2.5vw, 1.15rem);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 3.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
